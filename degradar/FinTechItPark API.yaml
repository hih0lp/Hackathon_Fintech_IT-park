          readOnly: true
        name:
          type: string
          title: Название агента
          maxLength: 50
        description:
          type: string
          title: Описание агента
        skill:
          type: string
          title: Системный промпт
        created:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - description
      - id
      - name
      - project
      - project_title
      - skill
