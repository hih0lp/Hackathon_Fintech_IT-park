openapi: 3.0.3
info:
  title: FinTechItPark API
  version: 1.0.0
  description: Документация API проекта FinTechItPark
paths:
  /agents/:
    get:
      operationId: agents_list
      summary: Список агентов
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: project
        schema:
          type: integer
        description: ID проекта (фильтр)
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - agents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomAgentList'
          description: ''
    post:
      operationId: agents_create
      summary: Создать агента
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomAgent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomAgent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomAgent'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAgent'
          description: ''
  /agents/{id}/:
    get:
      operationId: agents_retrieve
      summary: Получить агента
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - agents
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAgent'
          description: ''
    put:
      operationId: agents_update
      summary: Обновить агента
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomAgent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomAgent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomAgent'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAgent'
          description: ''
    patch:
      operationId: agents_partial_update
      summary: Частично обновить агента
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCustomAgent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCustomAgent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCustomAgent'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAgent'
          description: ''
    delete:
      operationId: agents_destroy
      summary: Удалить агента
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - agents
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Успешно удалено
  /chats/:
    get:
      operationId: chats_list
      description: Возвращает все чаты, доступные текущему пользователю (чаты проектов,
        где он является владельцем). Можно фильтровать по `project` и искать по `name`.
      summary: Список чатов пользователя
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: project
        schema:
          type: integer
        description: ID проекта
      - in: query
        name: search
        schema:
          type: string
        description: Поиск по названию чата
      tags:
      - chats
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatList'
          description: ''
    post:
      operationId: chats_create
      description: Создаёт новый чат в указанном проекте. Требуется ID проекта через
        поле `project_id`.
      summary: Создать чат
      tags:
      - chats
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Chat'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Chat'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Chat'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
        '400':
          description: Ошибка валидации
  /chats/{chat_id}/ask/:
    post:
      operationId: chats_ask_create
      description: Принимает сообщение пользователя (поле `msg`). Контекст (история
        чата и данные проекта) формируется автоматически. Возвращает `request_id`
        для последующего опроса статуса.
      summary: Отправить сообщение нейросети
      parameters:
      - in: path
        name: chat_id
        schema:
          type: integer
        description: ID чата
        required: true
      tags:
      - chats
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                msg:
                  type: string
                  description: Текст сообщения пользователя
              required:
              - msg
      security:
      - jwtAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: integer
                  status:
                    type: string
                    enum:
                    - pending
          description: Задача поставлена в очередь
        '400':
          description: Отсутствует поле msg
        '403':
          description: Нет доступа к чату
        '404':
          description: Чат не найден
  /chats/{chat_id}/ask/{request_id}/:
    get:
      operationId: chats_ask_retrieve
      description: Возвращает текущий статус запроса к нейросети. Если завершён —
        возвращает ответ бота и сгенерированные задачи.
      summary: Статус обработки сообщения
      parameters:
      - in: path
        name: chat_id
        schema:
          type: integer
        description: ID чата
        required: true
      - in: path
        name: request_id
        schema:
          type: integer
        description: ID запроса (получен при отправке)
        required: true
      tags:
      - chats
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - pending
                    - processing
                    - completed
                    - failed
                  request_id:
                    type: integer
                  result_text:
                    type: string
                    nullable: true
                  tasks:
                    type: array
                    items:
                      type: object
                    nullable: true
                  error:
                    type: string
                    nullable: true
          description: Успешный ответ (статус может быть completed, pending, processing
            или failed)
        '403':
          description: Нет доступа
        '404':
          description: Запрос или чат не найден
  /chats/{chat_id}/messages/:
    get:
      operationId: chats_messages_list
      description: Возвращает все сообщения чата (и от пользователя, и от нейросети).
      summary: Сообщения чата
      parameters:
      - in: path
        name: chat_id
        schema:
          type: integer
        description: ID чата
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - chats
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessageList'
          description: ''
        '403':
          description: Нет доступа к чату
  /chats/{id}/:
    delete:
      operationId: chats_destroy
      description: Удаляет чат и все его сообщения (каскадно). Только владелец проекта.
      summary: Удалить чат
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - chats
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Чат удалён
        '403':
          description: Нет прав
        '404':
          description: Чат не найден
  /chats/chats/{chat_id}/new-version/:
    post:
      operationId: chats_chats_new_version_create
      description: Создаёт новый чат, который наследует контекст (историю) текущего
        чата. Новая версия будет открыта для общения.
      summary: Создать новую версию чата
      parameters:
      - in: path
        name: chat_id
        schema:
          type: integer
        description: ID исходного чата
        required: true
      tags:
      - chats
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: ''
        '400':
          description: Превышен лимит версий или ошибка
  /projects/:
    get:
      operationId: projects_list
      summary: Список проектов пользователя
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectList'
          description: ''
    post:
      operationId: projects_create
      description: 'Создаёт новый проект. Если `sync_with_yougile: true` и у пользователя
        есть API-ключ YouGile – создаётся зеркальный проект в YouGile.'
      summary: Создать проект
      tags:
      - projects
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                country:
                  type: string
                sync_with_yougile:
                  type: boolean
                  default: false
                uploaded_files:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
              - title
              - description
              - country
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /projects/{id}/:
    get:
      operationId: projects_retrieve
      description: Возвращает информацию о конкретном проекте вместе с файлами
      summary: Детали проекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
        '404':
          description: Проект не найден
    put:
      operationId: projects_update
      description: Обновляет все поля проекта (только владелец)
      summary: Полное обновление проекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Project'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Project'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
        '400':
          description: Ошибка валидации
        '403':
          description: Нет прав
    patch:
      operationId: projects_partial_update
      description: Обновляет выбранные поля проекта (только владелец)
      summary: Частичное обновление проекта
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProject'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProject'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProject'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
        '400':
          description: Ошибка валидации
        '403':
          description: Нет прав
    delete:
      operationId: projects_destroy
      description: Удаляет проект и все связанные файлы (только владелец)
      summary: Удалить проект
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Успешно удалено
        '403':
          description: Нет прав
        '404':
          description: Не найден
  /projects/{project_id}/upload/:
    post:
      operationId: projects_upload_create
      description: Принимает список файлов в поле `files` (multipart/form-data, массив)
      summary: Загрузить несколько файлов в проект
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectFile'
          description: ''
        '400':
          description: Ошибка валидации
  /projects/files/{file_id}/:
    delete:
      operationId: projects_files_destroy
      description: Удаляет конкретный файл. Пользователь должен быть владельцем проекта,
        к которому привязан файл.
      summary: Удалить файл из проекта
      parameters:
      - in: path
        name: file_id
        schema:
          type: integer
        description: ID файла
        required: true
      tags:
      - projects
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Файл удалён
        '403':
          description: Нет прав
        '404':
          description: Файл не найден
  /tasks/:
    get:
      operationId: tasks_list
      description: Возвращает все задачи пользователя (через чаты). Можно фильтровать
        по chat_id.
      summary: Список задач
      parameters:
      - in: query
        name: chat
        schema:
          type: integer
        description: ID чата
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - tasks
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskList'
          description: ''
  /tasks/{id}/:
    get:
      operationId: tasks_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tasks
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
    put:
      operationId: tasks_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Task'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Task'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
    patch:
      operationId: tasks_partial_update
      description: Обновление информации о задаче
      summary: Обновить задачу
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTask'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedTask'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedTask'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
    delete:
      operationId: tasks_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - tasks
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /tasks/create/:
    post:
      operationId: tasks_create_create
      description: Принимает `chat_id` и список `titles`. Для каждого заголовка создаётся
        задача с `is_closed=False`.
      summary: Создать несколько задач
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskBulkCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TaskBulkCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TaskBulkCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTaskList'
          description: ''
        '400':
          description: Ошибка валидации
  /tasks/duplicate-to-yougile/:
    post:
      operationId: tasks_duplicate_to_yougile_create
      description: Для переданных ID локальных задач создаются копии в YouGile в колонке,
        привязанной к проекту.
      summary: Продублировать задачи в YouGile
      tags:
      - tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicateToYouGile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DuplicateToYouGile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DuplicateToYouGile'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
          description: ''
        '400':
          description: Ошибка валидации или синхронизации
        '403':
          description: Нет доступа к задачам
  /users/login/:
    post:
      operationId: users_login_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Успешный вход (токены и данные пользователя)
        '401':
          description: Неверный email/пароль или email не подтверждён
  /users/register/:
    post:
      operationId: users_register_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: Код отправлен
        '400':
          description: Ошибка валидации
  /users/resend-code/:
    post:
      operationId: users_resend_code_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Email'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Email'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Email'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Новый код отправлен
        '400':
          description: Email уже подтверждён
        '404':
          description: Пользователь не найден
  /users/token/refresh/:
    post:
      operationId: users_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /users/verify-code/:
    post:
      operationId: users_verify_code_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCode'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyCode'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyCode'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Успешная активация и токены
        '400':
          description: 'Ошибка: код истёк, неверный код или email уже подтверждён'
        '404':
          description: Пользователь не найден
  /users/yougile/auth/:
    post:
      operationId: users_yougile_auth_create
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YouGileAuth'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/YouGileAuth'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/YouGileAuth'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: API-ключ YouGile успешно сохранён.
        '400':
          description: Не удалось получить API-ключ. Проверьте ответ YouGile.
components:
  schemas:
    Chat:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        created:
          type: string
          format: date-time
          readOnly: true
        project_id:
          type: integer
          writeOnly: true
        available:
          type: boolean
          title: Открытый чат
      required:
      - created
      - id
      - name
      - project_id
    CustomAgent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        project:
