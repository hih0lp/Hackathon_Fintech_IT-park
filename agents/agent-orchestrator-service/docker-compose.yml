services:
  agents-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents-orchestrator
    env_file:
      - .env
    ports:
      - "8090:8090"
    depends_on:
      - filter-content-agent
      - ambiguilty-resolver-0lvl-agent
      - financial-crime-integrity-agent
      - data-protection-agent
      - payments-vulnerability-agent
      - consumer-protection-agent
      - ai-governance-analyst-v3-agent
      - crypto-domain-analyzer-agent
    restart: unless-stopped

  filter-content-agent:
    build:
      context: ../filter-content-agent
      dockerfile: Dockerfile
    container_name: filter-content-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${FILTER_CONTENT_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${FILTER_CONTENT_TEMPERATURE}
      SKILL_DIR: ${FILTER_CONTENT_SKILL_DIR}
    expose:
      - "8088"
    restart: unless-stopped

  ambiguilty-resolver-0lvl-agent:
    build:
      context: ../ambiguilty-resolver-0lvl-service
      dockerfile: Dockerfile
    container_name: ambiguilty-resolver-0lvl-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${AMBIGUITY_RESOLVER_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${AMBIGUITY_RESOLVER_TEMPERATURE}
      SKILL_DIR: ${AMBIGUITY_RESOLVER_SKILL_DIR}
    expose:
      - "8086"
    restart: unless-stopped

  financial-crime-integrity-agent:
    build:
      context: ../financial-crime-integrity-agent-service
      dockerfile: Dockerfile
    container_name: financial-crime-integrity-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${FINANCIAL_CRIME_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${FINANCIAL_CRIME_TEMPERATURE}
      SKILL_DIR: ${FINANCIAL_CRIME_SKILL_DIR}
    expose:
      - "8080"
    restart: unless-stopped

  data-protection-agent:
    build:
      context: ../data-protection-agent-service
      dockerfile: Dockerfile
    container_name: data-protection-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${DATA_PROTECTION_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${DATA_PROTECTION_TEMPERATURE}
      SKILL_DIR: ${DATA_PROTECTION_SKILL_DIR}
    expose:
      - "8082"
    restart: unless-stopped

  payments-vulnerability-agent:
    build:
      context: ../payments-vulnerability-agent-service
      dockerfile: Dockerfile
    container_name: payments-vulnerability-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${PAYMENTS_VULNERABILITY_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${PAYMENTS_VULNERABILITY_TEMPERATURE}
      SKILL_DIR: ${PAYMENTS_VULNERABILITY_SKILL_DIR}
    expose:
      - "8083"
    restart: unless-stopped

  consumer-protection-agent:
    build:
      context: ../consumer-protection-agent-service
      dockerfile: Dockerfile
    container_name: consumer-protection-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${CONSUMER_PROTECTION_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${CONSUMER_PROTECTION_TEMPERATURE}
      SKILL_DIR: ${CONSUMER_PROTECTION_SKILL_DIR}
    expose:
      - "8084"
    restart: unless-stopped

  ai-governance-analyst-v3-agent:
    build:
      context: ../ai-governance-analyst-v3-service
      dockerfile: Dockerfile
    container_name: ai-governance-analyst-v3-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${AI_GOVERNANCE_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${AI_GOVERNANCE_TEMPERATURE}
      SKILL_DIR: ${AI_GOVERNANCE_SKILL_DIR}
    expose:
      - "8085"
    restart: unless-stopped

  crypto-domain-analyzer-agent:
    build:
      context: ../crypto-domain-analyzer-service
      dockerfile: Dockerfile
    container_name: crypto-domain-analyzer-agent
    env_file:
      - .env
    environment:
      MAX_TOKENS: ${CRYPTO_DOMAIN_MAX_TOKENS}
      ANTHROPIC_TEMPERATURE: ${CRYPTO_DOMAIN_TEMPERATURE}
      SKILL_DIR: ${CRYPTO_DOMAIN_SKILL_DIR}
    expose:
      - "8087"
    restart: unless-stopped
